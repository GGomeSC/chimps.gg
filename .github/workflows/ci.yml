name: CI

on:
  pull_request:
  push:
    branches: [main, "migration/**"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PUBLIC_SITE_URL: https://example.com
      PUBLIC_SUPABASE_URL: https://example.supabase.co
      SUPABASE_SECRET_KEY: sb_secret_ci_build_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.5
          cache: true

      - run: pnpm install --frozen-lockfile

      - name: Verify generated code
        run: |
          pnpm run generate
          git diff --exit-code

      - name: Start local Supabase
        run: pnpm exec supabase start -x edge-runtime,gotrue,imgproxy,kong,logflare,mailpit,postgres-meta,postgrest,realtime,storage-api,studio,supavisor,vector

      - name: Test generated queries against PostgreSQL
        env:
          INTEGRATION_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres?sslmode=disable
        run: go test -tags=integration -race ./...

      - run: go vet -tags=integration ./...

      - name: Verify go fix output
        run: |
          go fix ./...
          git diff --exit-code

      - run: pnpm run check
      - run: pnpm run build
      - run: git diff --check

      - if: always()
        run: pnpm exec supabase stop --no-backup
