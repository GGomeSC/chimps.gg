openapi: 3.0.3
info:
  title: chimps.gg internal service
  version: 1.0.0
  description: Private protocol between SvelteKit and the single Go Function.
servers:
  - url: /api/chimps
security:
  - internalSecret: []
paths:
  /players/oak:
    post:
      operationId: resolveOwnPlayer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oak]
              properties:
                oak: { type: string, minLength: 8, maxLength: 2048 }
      responses:
        "200":
          description: OAK resolved transiently; only the public user ID is returned.
          content:
            application/json:
              schema:
                type: object
                required: [userId]
                properties:
                  userId: { type: string }
        default: { $ref: "#/components/responses/Error" }
  /players/resolve:
    post:
      operationId: resolvePlayer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier]
              properties:
                identifier: { type: string, minLength: 1, maxLength: 512 }
      responses:
        "200":
          description: Indexed public player.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicPlayer" }
        default: { $ref: "#/components/responses/Error" }
  /sync/community-maps:
    post:
      operationId: syncCommunityMaps
      responses:
        "200":
          description: Cached maps refreshed and snapshotted.
          content:
            application/json:
              schema:
                type: object
                required: [version, maps]
                properties:
                  version: { type: string }
                  maps: { type: integer }
        default: { $ref: "#/components/responses/Error" }
  /public/players:
    get:
      operationId: searchPublicPlayers
      parameters:
        - { in: query, name: q, required: true, schema: { type: string, minLength: 1, maxLength: 80 } }
      responses:
        "200":
          description: Previously indexed matching players.
          content:
            application/json:
              schema:
                type: object
                required: [players]
                properties:
                  players:
                    type: array
                    items: { $ref: "#/components/schemas/PublicPlayer" }
        default: { $ref: "#/components/responses/Error" }
  /public/players/{userId}:
    get:
      operationId: getPublicPlayer
      parameters:
        - { in: path, name: userId, required: true, schema: { type: string } }
      responses:
        "200":
          description: Indexed public player.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicPlayer" }
        default: { $ref: "#/components/responses/Error" }
  /public/community-maps/{mapCode}:
    get:
      operationId: getPublicCommunityMap
      parameters:
        - { in: path, name: mapCode, required: true, schema: { type: string } }
      responses:
        "200":
          description: Live/read-through cached community map and tracked deltas.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicCommunityMap" }
        default: { $ref: "#/components/responses/Error" }
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          description: Database is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/Error"
  /studio/maps:
    get:
      operationId: getStudioMaps
      responses:
        "200":
          description: Studio map rows.
          content:
            application/json:
              schema:
                type: object
                required: [maps]
                properties:
                  maps:
                    type: array
                    items: { $ref: "#/components/schemas/MapRow" }
        default: { $ref: "#/components/responses/Error" }
  /studio/strategy-references:
    get:
      operationId: getStudioStrategyReferences
      responses:
        "200":
          description: Lookups used by strategy forms.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudioStrategyReferences" }
        default: { $ref: "#/components/responses/Error" }
  /studio/strategies:
    get:
      operationId: getStudioStrategies
      responses:
        "200":
          description: Studio strategy list.
          content:
            application/json:
              schema:
                type: object
                required: [strategies]
                properties:
                  strategies:
                    type: array
                    items: { $ref: "#/components/schemas/StudioStrategyListItem" }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createStudioStrategy
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StrategyInput" }
      responses:
        "200":
          description: Created strategy ID.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IdResponse" }
        default: { $ref: "#/components/responses/Error" }
  /studio/strategies/{strategyId}:
    parameters:
      - $ref: "#/components/parameters/StrategyId"
    get:
      operationId: getStudioStrategy
      responses:
        "200":
          description: Complete strategy editor data.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudioStrategyEditor" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteStudioStrategy
      responses:
        "200":
          description: Delete completed, including a missing-row no-op.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        default: { $ref: "#/components/responses/Error" }
  /studio/strategies/{strategyId}/metadata:
    parameters:
      - $ref: "#/components/parameters/StrategyId"
    patch:
      operationId: updateStudioStrategyMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StrategyInput" }
      responses:
        "200":
          description: Update completed, including a missing-row no-op.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedResponse" }
        default: { $ref: "#/components/responses/Error" }
  /studio/strategies/{strategyId}/steps:
    parameters:
      - $ref: "#/components/parameters/StrategyId"
    post:
      operationId: createStudioStep
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepInput" }
      responses:
        "200":
          description: Step created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedResponse" }
        default: { $ref: "#/components/responses/Error" }
  /studio/strategies/{strategyId}/steps/{stepId}:
    parameters:
      - $ref: "#/components/parameters/StrategyId"
      - $ref: "#/components/parameters/StepId"
    patch:
      operationId: updateStudioStep
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StepInput" }
      responses:
        "200":
          description: Step update completed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedResponse" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteStudioStep
      responses:
        "200":
          description: Step delete completed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedResponse" }
        default: { $ref: "#/components/responses/Error" }
  /studio/strategies/{strategyId}/steps/{stepId}/move:
    parameters:
      - $ref: "#/components/parameters/StrategyId"
      - $ref: "#/components/parameters/StepId"
    post:
      operationId: moveStudioStep
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [direction]
              properties:
                direction:
                  type: string
                  enum: [up, down]
      responses:
        "200":
          description: Move completed or successful edge no-op.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SavedResponse" }
        default: { $ref: "#/components/responses/Error" }
  /studio/strategies/{strategyId}/placements:
    parameters:
      - $ref: "#/components/parameters/StrategyId"
    post:
      operationId: createStudioPlacement
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlacementCreateInput" }
      responses:
        "200":
          description: Placement created; SvelteKit translates this to external 201.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlacementRow" }
        default: { $ref: "#/components/responses/Error" }
  /studio/strategies/{strategyId}/placements/{placementId}:
    parameters:
      - $ref: "#/components/parameters/StrategyId"
      - $ref: "#/components/parameters/PlacementId"
    patch:
      operationId: updateStudioPlacement
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PlacementUpdateInput" }
      responses:
        "200":
          description: Updated placement.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlacementRow" }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteStudioPlacement
      responses:
        "200":
          description: Delete completed; SvelteKit translates this to external 204.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        default: { $ref: "#/components/responses/Error" }
  /studio/heroes:
    get:
      operationId: getStudioHeroes
      responses:
        "200":
          description: Studio hero profile list.
          content:
            application/json:
              schema:
                type: object
                required: [heroes]
                properties:
                  heroes:
                    type: array
                    items: { $ref: "#/components/schemas/StudioHeroListItem" }
        default: { $ref: "#/components/responses/Error" }
  /studio/heroes/{heroId}:
    parameters:
      - $ref: "#/components/parameters/HeroId"
    get:
      operationId: getStudioHero
      responses:
        "200":
          description: Studio hero profile editor.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudioHeroEditor" }
        default: { $ref: "#/components/responses/Error" }
  /studio/heroes/{heroId}/profile:
    parameters:
      - $ref: "#/components/parameters/HeroId"
    put:
      operationId: updateStudioHeroProfile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HeroProfileInput" }
      responses:
        "200":
          description: Profile and synergies updated transactionally.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessResponse" }
        default: { $ref: "#/components/responses/Error" }
  /public/references:
    get:
      operationId: getPublicReferences
      responses:
        "200":
          description: Public reference data.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicReferences" }
        default: { $ref: "#/components/responses/Error" }
  /public/versions:
    get:
      operationId: getPublicVersions
      responses:
        "200":
          description: Ready strategy versions.
          content:
            application/json:
              schema:
                type: object
                required: [versions]
                properties:
                  versions:
                    type: array
                    items: { type: string }
        default: { $ref: "#/components/responses/Error" }
  /public/latest:
    get:
      operationId: getPublicLatestStrategies
      parameters:
        - in: query
          name: limit
          required: true
          schema: { type: integer, minimum: 1, maximum: 24 }
      responses:
        "200":
          description: Latest ready strategy summaries.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicStrategiesResponse" }
        default: { $ref: "#/components/responses/Error" }
  /public/maps:
    get:
      operationId: getPublicHomeMaps
      responses:
        "200":
          description: Home map list and ready guide counts.
          content:
            application/json:
              schema:
                type: object
                required: [maps]
                properties:
                  maps:
                    type: array
                    items: { $ref: "#/components/schemas/HomeMap" }
        default: { $ref: "#/components/responses/Error" }
  /public/strategies:
    get:
      operationId: discoverPublicStrategies
      parameters:
        - { in: query, name: mapId, schema: { type: integer, format: int64 } }
        - { in: query, name: modeId, schema: { type: integer, format: int64 } }
        - { in: query, name: heroId, schema: { type: integer, format: int64 } }
        - { in: query, name: executionDifficulty, schema: { type: integer, minimum: 1, maximum: 5 } }
        - { in: query, name: mapDifficulty, schema: { $ref: "#/components/schemas/MapDifficulty" } }
        - { in: query, name: version, schema: { type: string } }
        - { in: query, name: cursor, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Ready strategy page for already-validated filters.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicStrategyPage" }
        default: { $ref: "#/components/responses/Error" }
  /public/strategies/{strategyId}:
    parameters:
      - $ref: "#/components/parameters/StrategyId"
    get:
      operationId: getPublicStrategy
      responses:
        "200":
          description: Ready strategy detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicStrategyDetail" }
        default: { $ref: "#/components/responses/Error" }
  /public/heroes:
    get:
      operationId: getPublicHeroes
      responses:
        "200":
          description: Public hero summaries.
          content:
            application/json:
              schema:
                type: object
                required: [heroes]
                properties:
                  heroes:
                    type: array
                    items: { $ref: "#/components/schemas/HeroSummary" }
        default: { $ref: "#/components/responses/Error" }
  /public/heroes/{heroId}:
    parameters:
      - $ref: "#/components/parameters/HeroId"
    get:
      operationId: getPublicHero
      responses:
        "200":
          description: Public hero detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicHeroDetail" }
        default: { $ref: "#/components/responses/Error" }
components:
  securitySchemes:
    internalSecret:
      type: http
      scheme: bearer
  responses:
    Error:
      description: Internal service error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
  parameters:
    StrategyId:
      in: path
      name: strategyId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    StepId:
      in: path
      name: stepId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    PlacementId:
      in: path
      name: placementId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
    HeroId:
      in: path
      name: heroId
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
  schemas:
    PublicPlayer:
      type: object
      required: [userId, displayName, rank, veteranRank, achievements, mostExperiencedMonkey, highestRound, avatarUrl, bannerUrl, followers, bloonsPopped, gameCount, gamesWon, lastSyncedAt]
      properties:
        userId: { type: string }
        displayName: { type: string }
        rank: { type: integer }
        veteranRank: { type: integer }
        achievements: { type: integer }
        mostExperiencedMonkey: { type: string }
        highestRound: { type: integer }
        avatarUrl: { type: string, nullable: true }
        bannerUrl: { type: string, nullable: true }
        followers: { type: integer, format: int64 }
        bloonsPopped: { type: integer, format: int64 }
        gameCount: { type: integer, format: int64 }
        gamesWon: { type: integer, format: int64 }
        lastSyncedAt: { type: string, format: date-time }
    CommunityMapCounters:
      type: object
      required: [plays, wins, losses, playsUnique, winsUnique, lossesUnique]
      properties:
        plays: { type: integer, format: int64 }
        wins: { type: integer, format: int64 }
        losses: { type: integer, format: int64 }
        playsUnique: { type: integer, format: int64 }
        winsUnique: { type: integer, format: int64 }
        lossesUnique: { type: integer, format: int64 }
    CommunityMapVersionTrend:
      type: object
      required: [version, sinceTrackingBegan, plays, wins, losses, playsUnique, winsUnique, lossesUnique]
      properties:
        version: { type: string }
        sinceTrackingBegan: { type: boolean }
        plays: { type: integer, format: int64 }
        wins: { type: integer, format: int64 }
        losses: { type: integer, format: int64 }
        playsUnique: { type: integer, format: int64 }
        winsUnique: { type: integer, format: int64 }
        lossesUnique: { type: integer, format: int64 }
    CommunityMapTransition:
      type: object
      required: [fromVersion, toVersion, capturedAt]
      properties:
        fromVersion: { type: string }
        toVersion: { type: string }
        capturedAt: { type: string, format: date-time }
    PublicCommunityMap:
      type: object
      required: [mapCode, name, creator, createdAt, creationVersion, mapUrl, counters, winRate, firstObservedAt, lastSyncedAt, trends, transitions]
      properties:
        mapCode: { type: string }
        name: { type: string }
        creator:
          nullable: true
          allOf: [{ $ref: "#/components/schemas/PublicPlayer" }]
        createdAt: { type: string, format: date-time }
        creationVersion: { type: string }
        mapUrl: { type: string }
        counters: { $ref: "#/components/schemas/CommunityMapCounters" }
        winRate: { type: number, format: double, nullable: true, description: "Decisive win rate: wins / (wins + losses)." }
        firstObservedAt: { type: string, format: date-time }
        lastSyncedAt: { type: string, format: date-time }
        trends:
          type: array
          items: { $ref: "#/components/schemas/CommunityMapVersionTrend" }
        transitions:
          type: array
          items: { $ref: "#/components/schemas/CommunityMapTransition" }
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    HealthResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
    SuccessResponse:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
    SavedResponse:
      type: object
      required: [saved]
      properties:
        saved: { type: boolean }
    IdResponse:
      type: object
      required: [id]
      properties:
        id: { type: integer, format: int64 }
    MapDifficulty:
      type: string
      enum: [Beginner, Intermediate, Advanced, Expert]
    TowerCategory:
      type: string
      enum: [Primary, Military, Magic, Support, Hero]
    StrategyStatus:
      type: string
      enum: [draft, ready, archived]
    StepAction:
      type: string
      enum: [place, upgrade, sell, retarget, other]
    MapRow:
      type: object
      required: [id, name, difficulty, image_url, nk_map_id, nk_image_url, plays, wins, upvotes, last_synced_at, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        difficulty:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MapDifficulty"
        image_url: { type: string, nullable: true }
        nk_map_id: { type: string }
        nk_image_url: { type: string, nullable: true }
        plays: { type: integer, format: int64, nullable: true }
        wins: { type: integer, format: int64, nullable: true }
        upvotes: { type: integer, format: int64, nullable: true }
        last_synced_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MapReference:
      type: object
      required: [id, name, difficulty]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        difficulty:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MapDifficulty"
    GameModeRow:
      type: object
      required: [id, name]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
    TowerReference:
      type: object
      required: [id, name]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
    TowerRow:
      type: object
      required: [id, name, category, base_cost, icon_path, description, attack_style, xp_ratio, technical_description, profile_source_url, icon_url]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        category: { $ref: "#/components/schemas/TowerCategory" }
        base_cost: { type: integer, nullable: true }
        icon_path: { type: string }
        description: { type: string, nullable: true }
        attack_style: { type: string, nullable: true }
        xp_ratio: { type: number, format: double, nullable: true }
        technical_description: { type: string, nullable: true }
        profile_source_url: { type: string, nullable: true }
        icon_url: { type: string }
    StrategyRow:
      type: object
      required: [id, map_id, game_mode_id, title, description, hero_id, source_url, verified_version, exec_difficulty, status, score, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        map_id: { type: integer, format: int64 }
        game_mode_id: { type: integer, format: int64 }
        title: { type: string }
        description: { type: string, nullable: true }
        hero_id: { type: integer, format: int64, nullable: true }
        source_url: { type: string, nullable: true }
        verified_version: { type: string, nullable: true }
        exec_difficulty: { type: integer, nullable: true }
        status: { $ref: "#/components/schemas/StrategyStatus" }
        score: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PlacementRow:
      type: object
      required: [id, strategy_id, tower_id, pos_x, pos_y, final_path, label, notes]
      properties:
        id: { type: integer, format: int64 }
        strategy_id: { type: integer, format: int64 }
        tower_id: { type: integer, format: int64 }
        pos_x: { type: number, format: double }
        pos_y: { type: number, format: double }
        final_path: { type: string, nullable: true }
        label: { type: string, nullable: true }
        notes: { type: string, nullable: true }
    StepRow:
      type: object
      required: [id, strategy_id, placement_id, round_number, action, target_path, description, order_index]
      properties:
        id: { type: integer, format: int64 }
        strategy_id: { type: integer, format: int64 }
        placement_id: { type: integer, format: int64, nullable: true }
        round_number: { type: integer }
        action: { $ref: "#/components/schemas/StepAction" }
        target_path: { type: string, nullable: true }
        description: { type: string, nullable: true }
        order_index: { type: integer }
    StrategyInput:
      type: object
      required: [map_id, game_mode_id, title, description, hero_id, source_url, verified_version, exec_difficulty, status]
      properties:
        map_id: { type: integer, format: int64 }
        game_mode_id: { type: integer, format: int64 }
        title: { type: string }
        description: { type: string, nullable: true }
        hero_id: { type: integer, format: int64, nullable: true }
        source_url: { type: string, nullable: true }
        verified_version: { type: string, nullable: true }
        exec_difficulty: { type: integer, nullable: true }
        status: { $ref: "#/components/schemas/StrategyStatus" }
    StepInput:
      type: object
      required: [round_number, action, placement_id, target_path, description]
      properties:
        round_number: { type: integer }
        action: { $ref: "#/components/schemas/StepAction" }
        placement_id: { type: integer, format: int64, nullable: true }
        target_path: { type: string, nullable: true }
        description: { type: string, nullable: true }
    PlacementCreateInput:
      type: object
      required: [tower_id, pos_x, pos_y]
      properties:
        tower_id: { type: integer, format: int64 }
        pos_x: { type: number, format: double }
        pos_y: { type: number, format: double }
    PlacementUpdateInput:
      type: object
      properties:
        pos_x: { type: number, format: double }
        pos_y: { type: number, format: double }
        final_path: { type: string, nullable: true }
        label: { type: string, nullable: true }
        notes: { type: string, nullable: true }
